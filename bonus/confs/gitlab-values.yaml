global:
  edition: ce
  hosts:
    domain: mjeannin.com
  ingress:
    enabled: true
    class: traefik
    configureCertmanager: false
  psql:
    connectTimeout: 30
  kas:
    enabled: false

installCertmanager: false

nginx-ingress:
  enabled: false

prometheus:
  install: false

gitlab-runner:
  install: false

registry:
  enabled: false

gitlab:
  gitlab-exporter:
    enabled: false
  gitlab-shell:
    enabled: false
  webservice:
    workerProcesses: 1
    resources:
      requests: {cpu: 100m, memory: 900Mi}
      limits: {cpu: 300m, memory: 1500Mi}
    minReplicas: 1
    maxReplicas: 1
  sidekiq:
    concurrency: 5
    resources:
      requests: {cpu: 50m, memory: 256Mi}
      limits: {cpu: 150m, memory: 256Mi}
    minReplicas: 1
    maxReplicas: 1
  toolbox:
    enabled: false
  gitaly:
    resources:
      requests: {cpu: 50m, memory: 256Mi}
      limits: {cpu: 150m, memory: 512Mi}
    persistence:
      size: 5Gi

postgresql:
  install: true
  resources:
    requests: {cpu: 50m, memory: 200Mi}
    limits: {cpu: 150m, memory: 300Mi}
  persistence:
    size: 2Gi

redis:
  metrics: 
    enabled: false 
  install: true
  resources:
    requests: {cpu: 30m, memory: 64Mi}
    limits: {cpu: 100m, memory: 128Mi}
  master:
    persistence:
      size: 1Gi
      
gitlab-pages:
  enabled: false