global:
  edition: ce
  hosts:
    domain: mjeannin.com
  ingress:
    enabled: true
    class: traefik
    configureCertmanager: false
  psql:
    connectTimeout: 30
  kas:
    enabled: false

installCertmanager: false

nginx-ingress:
  enabled: false

prometheus:
  install: false

gitlab-runner:
  install: false

registry:
  enabled: false

gitlab-pages:
  enabled: false

gitlab:
    gitaly:
        resources:
            requests:
                memory: 256Mi
                cpu: 50m
            limits:
                memory: 512Mi
    gitlab-shell:
        enabled: false
    webservice:
        replicaCount: 1
        workerProcesses: 1
        minReplicas: 1
        maxReplicas: 1
        resources:
            requests:
                memory: 900Mi
                cpu: 100m
            limits:
                memory: 1.5Gi
    sidekiq:
        concurrency: 5
        replicas: 1
        resources:
            requests:
                memory: 256Mi
                cpu: 100m
    toolbox:
        resources:
            requests:
                memory: 256Mi
                cpu: 50m

postgresql:
  install: true
  resources:
    requests: {cpu: 50m, memory: 200Mi}
    limits: {cpu: 150m, memory: 300Mi}
  persistence:
    size: 2Gi

redis:
  metrics: 
    enabled: false 
  install: true
  resources:
    requests: {cpu: 30m, memory: 64Mi}
    limits: {cpu: 100m, memory: 128Mi}
  master:
    persistence:
      size: 1Gi
